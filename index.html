<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GODARA GARMENTS CHURU</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#121826;
      --muted:#9aa4b2;
      --text:#e6edf3;
      --brand:#22c55e;
      --danger:#ef4444;
      --border:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#070a0f,#0b0f14 40%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    a{color:inherit}
    header{
      position:sticky;top:0;z-index:50;
      background:rgba(11,15,20,.78);
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:14px 14px}
    .row{display:flex;gap:12px;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--border)}
    .brand h1{font-size:16px;margin:0;letter-spacing:.3px}
    .top-actions{display:flex;gap:10px;align-items:center}
    .pill{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      padding:8px 10px;border-radius:999px;
      font-size:13px;color:var(--text);text-decoration:none;
      display:inline-flex;gap:8px;align-items:center;
    }
    .pill strong{font-weight:700}
    .pill.green{border-color:rgba(34,197,94,.35)}
    .pill.red{border-color:rgba(239,68,68,.35)}
    .grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:12px}
    @media (min-width:720px){ .grid{grid-template-columns:repeat(3,minmax(0,1fr))} }
    .card{
      background:rgba(18,24,38,.75);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
    }
    .card img{width:100%;height:160px;object-fit:cover;display:block;background:#0b0f14}
    .card .p{padding:12px}
    .title{font-size:15px;margin:0 0 6px}
    .muted{color:var(--muted);font-size:13px}
    .btn{
      cursor:pointer;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;border-radius:12px;
      font-weight:600;
    }
    .btn.primary{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35)}
    .btn.danger{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.35)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:14px 0}
    .crumbs{color:var(--muted);font-size:13px}
    .panel{padding:14px;border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:16px}
    .two{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:900px){ .two{grid-template-columns:1.2fr .8fr} }
    input, textarea, select{
      width:100%;
      padding:10px 12px;border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      color:var(--text);
      outline:none;
    }
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
    .notice{border-left:4px solid var(--danger);padding:10px 12px;background:rgba(239,68,68,.08);border-radius:12px}
    .kpi{display:flex;gap:10px;flex-wrap:wrap}
    .kpi .pill{font-size:12px}
    .footer-space{height:30px}
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="row">
        <div class="brand">
          <img id="brandLogo" class="logo" alt="Logo">
          <div>
            <h1 id="brandName">GODARA GARMENTS CHURU</h1>
            <div class="muted">Category → Product → Collection → Order</div>
          </div>
        </div>

        <div class="top-actions">
          <a id="callBtn" class="pill green" href="#">
            <strong>Call</strong> <span id="phoneTxt">9636469795</span>
          </a>
          <button class="pill red" id="cartBtn"><strong>Cart</strong> (<span id="cartCount">0</span>)</button>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <div class="crumbs" id="crumbs">Home / Categories</div>
      <div class="kpi">
        <span class="pill">UPI: <strong id="upiTxt"></strong></span>
        <span class="pill">WhatsApp: <strong id="waTxt"></strong></span>
      </div>
    </div>

    <div id="app"></div>
    <div class="footer-space"></div>
  </main>

  <!-- Load config -->
  <script src="./config.js"></script>

  <script>
    const CFG = window.STORE_CONFIG;

    // ------- State -------
    const state = {
      view: "categories", // categories | products | collections | detail | cart | checkout | success
      selectedCategoryId: null,
      selectedProductId: null,
      selectedCollectionId: null,
      qty: 1,
      cart: []
    };

    // ------- Helpers -------
    const money = (n) => "₹" + Number(n).toFixed(0);
    const byId = (id) => document.getElementById(id);

    function findCategory() {
      return CFG.catalog.find(c => c.id === state.selectedCategoryId);
    }
    function findProduct() {
      const cat = findCategory();
      if (!cat) return null;
      return cat.products.find(p => p.id === state.selectedProductId);
    }
    function findCollection() {
      const p = findProduct();
      if (!p) return null;
      return p.collections.find(x => x.id === state.selectedCollectionId);
    }

    function cartCount() {
      return state.cart.reduce((s,i)=>s + i.qty, 0);
    }

    function upiLink({amount, note}) {
      // Standard UPI deep link
      const pa = encodeURIComponent(CFG.payment.upiId);
      const pn = encodeURIComponent(CFG.payment.payeeName || CFG.brand.name);
      const am = encodeURIComponent(String(amount || ""));
      const tn = encodeURIComponent(note || "Order - " + CFG.brand.name);
      // If amount blank, many apps still open; but we will send fixed price amount.
      return `upi://pay?pa=${pa}&pn=${pn}&am=${am}&cu=INR&tn=${tn}`;
    }

    function whatsappLink(message) {
      const phone = (CFG.brand.whatsapp || CFG.brand.phone).replace(/\D/g,'');
      const text = encodeURIComponent(message);
      return `https://wa.me/91${phone}?text=${text}`;
    }

    function buildWhatsAppMessage(order) {
      const lines = [];
      lines.push(`*${CFG.brand.name}* Order Request`);
      lines.push(``);
      lines.push(`Category: ${order.categoryName}`);
      lines.push(`Product: ${order.productName}`);
      lines.push(`Collection: ${order.collectionName}`);
      lines.push(`SKU: ${order.sku || "-"}`);
      lines.push(`Qty: ${order.qty}`);
      lines.push(`Price: ${money(order.price)} (Fixed, collection detail)`);
      lines.push(`Payment: ${order.paymentMethod}`);
      lines.push(``);
      lines.push(`Customer Name: ${order.customerName}`);
      lines.push(`Mobile: ${order.customerMobile}`);
      lines.push(`Address: ${order.customerAddress}`);
      lines.push(``);
      lines.push(`Note: ${CFG.delivery.extraChargeNote}`);
      lines.push(``);
      lines.push(`Please confirm order on WhatsApp.`);
      return lines.join("\n");
    }

    // ------- Rendering -------
    function setHeader() {
      byId("brandLogo").src = CFG.brand.logoUrl;
      byId("brandName").textContent = CFG.brand.name;
      byId("phoneTxt").textContent = CFG.brand.phone;
      byId("callBtn").href = "tel:" + CFG.brand.phone;
      byId("upiTxt").textContent = CFG.payment.upiId;
      byId("waTxt").textContent = CFG.brand.whatsapp;
      byId("cartCount").textContent = cartCount();
    }

    function setCrumbs(text) { byId("crumbs").textContent = text; }

    function cardGrid(itemsHtml) {
      return `<div class="grid">${itemsHtml}</div>`;
    }

    function renderCategories() {
      setCrumbs("Home / Categories");
      const html = CFG.catalog.map(cat => `
        <div class="card">
          <img src="${cat.image}" alt="${cat.name}">
          <div class="p">
            <h3 class="title">${cat.name}</h3>
            <div class="muted">Price range: <strong>${cat.priceRange}</strong></div>
            <div style="margin-top:10px">
              <button class="btn primary" onclick="goProducts('${cat.id}')">Open Products</button>
            </div>
          </div>
        </div>
      `).join("");
      byId("app").innerHTML = cardGrid(html);
    }

    function renderProducts() {
      const cat = findCategory();
      setCrumbs(`Home / ${cat.name} / Products`);
      const html = cat.products.map(p => `
        <div class="card">
          <img src="${p.image}" alt="${p.name}">
          <div class="p">
            <h3 class="title">${p.name}</h3>
            <div class="muted">Price range: <strong>${p.priceRange}</strong></div>
            <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" onclick="goCategories()">Back</button>
              <button class="btn primary" onclick="goCollections('${p.id}')">View Collections</button>
            </div>
          </div>
        </div>
      `).join("");
      byId("app").innerHTML = cardGrid(html);
    }

    function renderCollections() {
      const cat = findCategory();
      const p = findProduct();
      setCrumbs(`Home / ${cat.name} / ${p.name} / Collections`);
      const html = p.collections.map(c => `
        <div class="card">
          <img src="${c.image}" alt="${c.name}">
          <div class="p">
            <h3 class="title">${c.name}</h3>
            <div class="muted">Click to view fixed price + buy</div>
            <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" onclick="goProducts('${cat.id}')">Back</button>
              <button class="btn primary" onclick="goDetail('${c.id}')">Open Detail</button>
            </div>
          </div>
        </div>
      `).join("");
      byId("app").innerHTML = cardGrid(html);
    }

    function renderDetail() {
      const cat = findCategory();
      const p = findProduct();
      const c = findCollection();
      setCrumbs(`Home / ${cat.name} / ${p.name} / ${c.name} / Detail`);

      const html = `
        <div class="two">
          <div class="card">
            <img src="${c.image}" alt="${c.name}" style="height:320px">
            <div class="p">
              <h2 class="title" style="font-size:18px">${c.name}</h2>
              <div class="muted">Category: ${cat.name} • Product: ${p.name}</div>

              <div style="margin-top:12px" class="panel">
                <div class="muted">Fixed price (only on collection detail):</div>
                <div style="font-size:22px;font-weight:800;margin-top:6px">${money(c.fixedPrice)}</div>

                <label>Quantity</label>
                <select id="qtySel">
                  ${[1,2,3,4,5].map(n=>`<option value="${n}" ${n===state.qty?'selected':''}>${n}</option>`).join("")}
                </select>

                <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
                  <button class="btn" onclick="goCollections('${p.id}')">Back</button>
                  <button class="btn primary" onclick="addToCart()">Add to Cart</button>
                  <button class="btn primary" onclick="buyNow()">Buy Now</button>
                </div>
              </div>

              <div style="margin-top:12px" class="panel">
                <div class="muted"><strong>Note:</strong> Price range category/product par dikhega. Fixed price yahin (collection detail) par hai.</div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="notice">
              <strong>Warning:</strong> ${CFG.delivery.extraChargeNote}
            </div>

            <div style="margin-top:12px">
              <div class="muted">Payment Options (checkout par confirm hoga):</div>
              <ul class="muted" style="margin:8px 0 0 18px">
                <li>UPI QR Code</li>
                <li>UPI App Redirect</li>
                <li>Cash on Delivery</li>
              </ul>
            </div>

            <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" onclick="goCart()">Open Cart</button>
              <button class="btn primary" onclick="goCheckout()">Go Checkout</button>
            </div>
          </div>
        </div>
      `;
      byId("app").innerHTML = html;

      byId("qtySel").addEventListener("change", (e) => {
        state.qty = Number(e.target.value);
      });
    }

    function renderCart() {
      setCrumbs("Home / Cart");
      if (state.cart.length === 0) {
        byId("app").innerHTML = `
          <div class="panel">
            <h3 class="title">Cart is empty</h3>
            <button class="btn primary" onclick="goCategories()">Go to Categories</button>
          </div>
        `;
        return;
      }

      const rows = state.cart.map((it, idx) => `
        <div class="panel" style="margin-bottom:12px">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <img src="${it.image}" alt="${it.collectionName}" style="width:110px;height:80px;object-fit:cover;border-radius:12px;border:1px solid var(--border)">
            <div style="flex:1">
              <div style="font-weight:800">${it.collectionName}</div>
              <div class="muted">${it.categoryName} • ${it.productName}</div>
              <div class="muted">Fixed price: <strong>${money(it.price)}</strong></div>

              <label>Qty</label>
              <select onchange="updateCartQty(${idx}, this.value)">
                ${[1,2,3,4,5].map(n=>`<option value="${n}" ${n===it.qty?'selected':''}>${n}</option>`).join("")}
              </select>

              <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn danger" onclick="removeCartItem(${idx})">Remove</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      const total = state.cart.reduce((s,i)=>s + i.price*i.qty, 0);

      byId("app").innerHTML = `
        ${rows}
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <div>
              <div class="muted">Total</div>
              <div style="font-size:22px;font-weight:900">${money(total)}</div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" onclick="goCategories()">Continue Shopping</button>
              <button class="btn primary" onclick="goCheckout()">Checkout</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderCheckout() {
      setCrumbs("Home / Checkout");

      if (state.cart.length === 0) {
        byId("app").innerHTML = `
          <div class="panel">
            <h3 class="title">Cart is empty</h3>
            <button class="btn primary" onclick="goCategories()">Go to Categories</button>
          </div>
        `;
        return;
      }

      const total = state.cart.reduce((s,i)=>s + i.price*i.qty, 0);

      byId("app").innerHTML = `
        <div class="two">
          <div class="panel">
            <h3 class="title">Customer Details</h3>

            <label>Name</label>
            <input id="custName" placeholder="Enter name" />

            <label>Mobile No</label>
            <input id="custMobile" placeholder="Enter mobile number" />

            <label>Address</label>
            <textarea id="custAddress" rows="3" placeholder="Full address"></textarea>

            <div class="notice" style="margin-top:12px">
              <strong>Warning:</strong> ${CFG.delivery.extraChargeNote}
            </div>

            <h3 class="title" style="margin-top:16px">Payment Method</h3>
            <label>Select</label>
            <select id="payMethod">
              <option value="UPI_QR">UPI QR Code</option>
              <option value="UPI_REDIRECT">UPI App Redirect</option>
              <option value="COD">Cash on Delivery (COD)</option>
            </select>

            <div id="upiBox" class="panel" style="margin-top:12px">
              <div class="muted">UPI ID: <strong>${CFG.payment.upiId}</strong></div>
              <div class="muted">Total: <strong>${money(total)}</strong></div>
              <div class="muted" style="margin-top:8px">QR code below is for UPI payment (amount included):</div>
              <div style="margin-top:10px">
                <img id="upiQrImg" alt="UPI QR" style="width:220px;height:220px;border-radius:16px;border:1px solid var(--border);background:#fff" />
              </div>
              <div style="margin-top:10px">
                <a id="upiPayLink" class="pill green" href="#" target="_blank">Open UPI App</a>
              </div>
            </div>

            <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" onclick="goCart()">Back to Cart</button>
              <button class="btn primary" onclick="initiateOrder()">Submit / Initiate Order</button>
            </div>
          </div>

          <div class="panel">
            <h3 class="title">Order Summary</h3>
            <div class="muted">Items: <strong>${cartCount()}</strong></div>
            <div class="muted">Total: <strong>${money(total)}</strong></div>
            <div style="margin-top:10px" class="muted">
              Note: Order initiate hone ke baad WhatsApp par send karna mandatory hai (confirmation ke liye).
            </div>
          </div>
        </div>
      `;

      const link = upiLink({ amount: total, note: "Order - " + CFG.brand.name });
      byId("upiPayLink").href = link;

      // QR via public QR generator (image URL). Works on GitHub Pages.
      // If you want fully offline QR, then we need a local QR lib file.
      const qrData = encodeURIComponent(link);
      byId("upiQrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${qrData}`;

      function updatePayUI() {
        const method = byId("payMethod").value;
        byId("upiBox").style.display = (method === "UPI_QR" || method === "UPI_REDIRECT") ? "block" : "none";
        byId("upiPayLink").style.display = (method === "UPI_REDIRECT") ? "inline-flex" : "none";
      }
      byId("payMethod").addEventListener("change", updatePayUI);
      updatePayUI();
    }

    function renderSuccess(order) {
      setCrumbs("Home / Order Initiated");
      const msg = buildWhatsAppMessage(order);
      const wa = whatsappLink(msg);

      byId("app").innerHTML = `
        <div class="panel">
          <h2 class="title" style="font-size:18px">Order Initiated</h2>

          <div class="notice" style="margin-top:10px">
            <strong>Disclaimer:</strong> Order success karne ke liye WhatsApp par send kare.
          </div>

          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <a class="pill green" href="${wa}" target="_blank"><strong>Send on WhatsApp</strong></a>
            <button class="btn" onclick="goCategories()">Back to Home</button>
          </div>

          <div class="panel" style="margin-top:12px">
            <div class="muted">WhatsApp message preview:</div>
            <pre style="white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.25);padding:12px;border-radius:12px;border:1px solid var(--border);margin-top:8px">${msg}</pre>
          </div>
        </div>
      `;
    }

    // ------- Navigation functions (global for onclick) -------
    window.goCategories = function(){
      state.view = "categories";
      state.selectedCategoryId = null;
      state.selectedProductId = null;
      state.selectedCollectionId = null;
      render();
    }

    window.goProducts = function(categoryId){
      state.view = "products";
      state.selectedCategoryId = categoryId;
      state.selectedProductId = null;
      state.selectedCollectionId = null;
      render();
    }

    window.goCollections = function(productId){
      state.view = "collections";
      state.selectedProductId = productId;
      state.selectedCollectionId = null;
      render();
    }

    window.goDetail = function(collectionId){
      state.view = "detail";
      state.selectedCollectionId = collectionId;
      state.qty = 1;
      render();
    }

    window.goCart = function(){
      state.view = "cart";
      render();
    }

    window.goCheckout = function(){
      state.view = "checkout";
      render();
    }

    // Cart actions
    window.addToCart = function(){
      const cat = findCategory();
      const p = findProduct();
      const c = findCollection();
      const qty = state.qty || 1;

      const key = `${cat.id}|${p.id}|${c.id}`;
      const existing = state.cart.find(x => x.key === key);
      if (existing) existing.qty += qty;
      else {
        state.cart.push({
          key,
          categoryId: cat.id, categoryName: cat.name,
          productId: p.id, productName: p.name,
          collectionId: c.id, collectionName: c.name,
          image: c.image,
          sku: c.sku || "",
          price: Number(c.fixedPrice),
          qty
        });
      }
      setHeader();
      alert("Added to cart!");
    }

    window.buyNow = function(){
      addToCart();
      goCheckout();
    }

    window.updateCartQty = function(idx, val){
      state.cart[idx].qty = Number(val);
      setHeader();
      renderCart();
    }

    window.removeCartItem = function(idx){
      state.cart.splice(idx,1);
      setHeader();
      renderCart();
    }

    // Order
    window.initiateOrder = function(){
      const name = (byId("custName").value || "").trim();
      const mobile = (byId("custMobile").value || "").trim();
      const address = (byId("custAddress").value || "").trim();
      const payMethod = byId("payMethod").value;

      if (!name || !mobile || !address) {
        alert("Please Name, Mobile, Address fill karein.");
        return;
      }

      // If multiple items, WhatsApp message will include full cart list
      const total = state.cart.reduce((s,i)=>s + i.price*i.qty, 0);

      // Build WhatsApp message with full cart
      const lines = [];
      lines.push(`*${CFG.brand.name}* Order Request`);
      lines.push(`Customer Name: ${name}`);
      lines.push(`Mobile: ${mobile}`);
      lines.push(`Address: ${address}`);
      lines.push(`Payment: ${payMethod}`);
      lines.push(``);
      lines.push(`Items:`);
      state.cart.forEach((it, i) => {
        lines.push(`${i+1}) ${it.categoryName} / ${it.productName} / ${it.collectionName}`);
        lines.push(`   Qty: ${it.qty} • Price: ${money(it.price)} • Subtotal: ${money(it.price*it.qty)}`);
      });
      lines.push(``);
      lines.push(`Total: ${money(total)}`);
      lines.push(`UPI ID: ${CFG.payment.upiId}`);
      lines.push(``);
      lines.push(`Note: ${CFG.delivery.extraChargeNote}`);
      lines.push(``);
      lines.push(`Please confirm order on WhatsApp.`);

      const msg = lines.join("\n");
      const order = {
        categoryName: "(Multiple)",
        productName: "(Multiple)",
        collectionName: "(Multiple)",
        sku: "",
        qty: cartCount(),
        price: total,
        customerName: name,
        customerMobile: mobile,
        customerAddress: address,
        paymentMethod: payMethod,
        _whatsAppMessage: msg
      };

      // success screen uses buildWhatsAppMessage(order) (single item),
      // but we want full cart message; so override rendering:
      state.view = "success";
      setCrumbs("Home / Order Initiated");
      const wa = whatsappLink(msg);

      byId("app").innerHTML = `
        <div class="panel">
          <h2 class="title" style="font-size:18px">Order Initiated</h2>

          <div class="notice" style="margin-top:10px">
            <strong>Disclaimer:</strong> Order success karne ke liye WhatsApp par send kare.
          </div>

          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <a class="pill green" href="${wa}" target="_blank"><strong>Send on WhatsApp</strong></a>
            <button class="btn" onclick="goCategories()">Back to Home</button>
          </div>

          <div class="panel" style="margin-top:12px">
            <div class="muted">WhatsApp message preview:</div>
            <pre style="white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.25);padding:12px;border-radius:12px;border:1px solid var(--border);margin-top:8px">${msg}</pre>
          </div>
        </div>
      `;
    }

    // Cart button
    byId("cartBtn").addEventListener("click", () => goCart());

    function render(){
      setHeader();
      if (state.view === "categories") return renderCategories();
      if (state.view === "products") return renderProducts();
      if (state.view === "collections") return renderCollections();
      if (state.view === "detail") return renderDetail();
      if (state.view === "cart") return renderCart();
      if (state.view === "checkout") return renderCheckout();
    }

    // Boot
    render();
  </script>
</body>
</html>
